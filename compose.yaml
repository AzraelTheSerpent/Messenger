services:
  messenger.api:
    image: messenger.api
    build:
      context: .
      dockerfile: Messenger.API/Dockerfile
    networks:
      - net
    depends_on:
      messenger.db:
        condition: service_healthy
    
  messenger.db:
    image: postgres:15-alpine
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: 123321awd
      POSTGRES_USER: admin
      POSTGRES_DB: messenger
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - net
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d messenger" ]
      interval: 30s
      timeout: 10s
      retries: 3
      
volumes:
  postgres_data:

networks:
  net:
